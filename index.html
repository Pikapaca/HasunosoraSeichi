<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >


  <title>莲之空圣地部</title>

  <link rel="stylesheet" href="./style.css">
  <script src="./main.js" defer></script>
</head>

<body>
  <!-- 手机端菜单按钮 -->
  <button
    class="mobile-menu-button"
    id="mobile-menu-button"
    type="button"
    aria-label="打开导航菜单"
    aria-controls="sidebar"
    aria-expanded="false"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- 手机端侧边栏遮罩 -->
  <div
    class="sidebar-overlay"
    id="sidebar-overlay"
    hidden
  ></div>

  <!-- 左侧边栏 -->
<aside class="sidebar" id="sidebar">
  <a class="site-brand" href="./index.html">
    <span class="brand-icon" aria-hidden="true">
      <img src="./images/hasu.jpg" alt="">
    </span>

    <span class="brand-text">
      <strong>莲之空圣地部</strong>
      <small>HASUNOSORA PILGRIMAGE ARCHIVE</small>
    </span>
  </a>
      <!-- 搜索框放在这里 -->
  <div class="site-search">
    <label class="visually-hidden" for="site-search-input">
      搜索圣地
    </label>

    <input
      id="site-search-input"
      type="search"
      placeholder="搜索中文名或日文名"
      autocomplete="off"
    >

    <div
      class="search-results"
      id="search-results"
      hidden
    ></div>
  </div>

    <nav class="sidebar-nav" aria-label="网站主要导航">
      <a class="active" href="./index.html">
        <span>主页</span>
      </a>

      <a href="./places/index.html">
        <span>圣地列表</span>
      </a>

      <a href="./tips/index.html">
        <span>巡礼攻略</span>
      </a>

      <a href="./news/index.html">
        <span>石川相关</span>
      </a>

      <a href="./other/index.html">
        <span>其他</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <p>一起享受在莲之空的圣地巡礼吧！</p>
    </div>
  </aside>

  <!-- 页面主体 -->
  <main class="main-content">
  

    <!-- 最新圣地 -->
    <section class="homepage-section">
      <div class="section-header">
        <div>
          <p class="section-label">NEW PLACES</p>
          <h2>最新圣地</h2>
        </div>


      </div>

      <div
        class="place-grid"
        id="latest-places"
        aria-live="polite"
      >
        <p class="status-message">正在读取地点数据……</p>
      </div>
    </section>

    <!-- 热门地点 -->
    <section class="homepage-section">
      <div class="section-header">
        <div>
          <p class="section-label">DISCOVER</p>
          <h2>热门地点</h2>
        </div>

        <button
          class="section-button"
          id="shuffle-popular"
          type="button"
        >
          换一组
        </button>
      </div>

      <div
        class="place-grid"
        id="popular-places"
        aria-live="polite"
      ></div>
    </section>

    <!-- 美食圣地 -->
    <section class="homepage-section">
      <div class="section-header">
        <div>
          <p class="section-label">FOOD SPOTS</p>
          <h2>金泽美食圣地</h2>
        </div>

        <button
          class="section-button"
          id="shuffle-food"
          type="button"
        >
          换一组
        </button>
      </div>

      <div
        class="place-grid"
        id="food-places"
        aria-live="polite"
      ></div>
    </section>

    <footer class="site-footer">
      <p>莲之空圣地部</p>
      <p>本网站为非官方粉丝整理项目。</p>
    </footer>
  </main>
</body>
</html>
