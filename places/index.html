<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>圣地列表｜莲之空圣地部</title>

  <!-- places 文件夹返回上一级后才是 css -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./places.css">

  <!-- 这个页面使用单独的 places.js -->
  <script src="../places.js" defer></script>
</head>

<body>
  <!-- 手机端菜单按钮 -->
  <button
    class="mobile-menu-button"
    id="mobile-menu-button"
    type="button"
    aria-label="打开导航菜单"
    aria-controls="sidebar"
    aria-expanded="false"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- 手机端侧边栏遮罩 -->
  <div
    class="sidebar-overlay"
    id="sidebar-overlay"
    hidden
  ></div>

  <!-- 左侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <!-- 从 places 文件夹返回仓库根目录 -->
    <a class="site-brand" href="../index.html">
      <span class="brand-icon">蓮</span>

      <span class="brand-text">
        <strong>莲之空圣地部</strong>
        <small>HASUNOSORA PILGRIMAGE</small>
      </span>
    </a>

    <!-- 搜索框 -->
    <div class="site-search">
      <label
        class="visually-hidden"
        for="site-search-input"
      >
        搜索圣地
      </label>

      <input
        id="site-search-input"
        type="search"
        placeholder="搜索中文名或日文名"
        autocomplete="off"
      >

      <div
        class="search-results"
        id="search-results"
        hidden
      ></div>
    </div>

    <!-- 侧边栏导航 -->
    <nav
      class="sidebar-nav"
      aria-label="网站主要导航"
    >
      <a href="../index.html">
        <span class="nav-number">01</span>
        <span>主页</span>
      </a>

      <!-- 当前页面的 active 放在这里 -->
      <a
        class="active"
        href="./index.html"
        aria-current="page"
      >
        <span class="nav-number">02</span>
        <span>圣地列表</span>
      </a>

      <a href="../tips/index.html">
        <span class="nav-number">03</span>
        <span>巡礼攻略</span>
      </a>

      <a href="../news/index.html">
        <span class="nav-number">04</span>
        <span>石川相关</span>
      </a>

      <a href="../other/index.html">
        <span class="nav-number">05</span>
        <span>其他</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <p>享受莲之空的圣地巡礼吧！</p>
    </div>
  </aside>

  <!-- 页面主体 -->
  <main class="main-content places-main">
    <header class="page-heading">
      <p class="section-label">PLACES</p>
      <h1>圣地列表</h1>
    </header>

    <section
      class="region-section"
      aria-labelledby="region-heading"
    >
      <h2
        class="visually-hidden"
        id="region-heading"
      >
        按地区查看圣地
      </h2>

      <div class="region-list">
        <!-- 石川县 -->
        <article class="region-card">
          <button
            class="region-toggle"
            type="button"
            data-region-toggle
            aria-expanded="true"
            aria-controls="ishikawa-region-panel"
          >
            <span class="region-toggle-title">
              <strong>石川县</strong>
              <small>石川県</small>
            </span>

            <span
              class="region-toggle-icon"
              aria-hidden="true"
            ></span>
          </button>

          <!-- 默认展开，所以这里暂时不写 hidden -->
          <div
            class="region-panel"
            id="ishikawa-region-panel"
          >
            <a
              class="city-link"
              href="./ishikawa/kanazawa/"
            >
              <span class="city-name">
                <strong>金泽市</strong>
                <small>金沢市</small>
              </span>

              <span
                class="city-link-arrow"
                aria-hidden="true"
              >
                →
              </span>
            </a>

            <!-- 以后可以继续添加其他石川县地点 -->
            <!--
            <a
              class="city-link"
              href="./ishikawa/kaga/"
            >
              <span class="city-name">
                <strong>加贺地区</strong>
                <small>加賀地域</small>
              </span>

              <span
                class="city-link-arrow"
                aria-hidden="true"
              >
                →
              </span>
            </a>
            -->
          </div>
        </article>
      </div>
    </section>

    <footer class="site-footer">
      <p>莲之空圣地部</p>
      <p>本网站为非官方粉丝整理项目。</p>
    </footer>
  </main>
</body>
</html>
