<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>地点详情｜莲之空圣地部</title>

  <!-- 根目录公共样式 -->
  <link
    rel="stylesheet"
    href="../../../style.css"
  >

  <!-- 当前文件夹的详情页样式 -->
  <link
    rel="stylesheet"
    href="./detail.css"
  >

  <!-- 当前文件夹的详情页脚本 -->
  <script
    src="./detail.js"
    defer
  ></script>
</head>

<body>

 <!-- 手机端菜单按钮 -->
  <button
    class="mobile-menu-button"
    id="mobile-menu-button"
    type="button"
    aria-label="打开导航菜单"
    aria-controls="sidebar"
    aria-expanded="false"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- 手机端侧边栏遮罩 -->
  <div
    class="sidebar-overlay"
    id="sidebar-overlay"
    hidden
  ></div>

  <!-- 左侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <!-- 从 places 文件夹返回仓库根目录 -->
<a class="site-brand" href="../../../index.html">
  <span class="brand-icon" aria-hidden="true">
    <img src="../../../images/hasu.jpg" alt=""
    >
  </span>

  <span class="brand-text">
    <strong>莲之空圣地部</strong>
    <small>HASUNOSORA PILGRIMAGE ARCHIVE</small>
  </span>
</a>

    <!-- 搜索框 -->
    <div class="site-search">
      <label
        class="visually-hidden"
        for="site-search-input"
      >
        搜索圣地
      </label>

      <input
        id="site-search-input"
        type="search"
        placeholder="搜索中文名或日文名"
        autocomplete="off"
      >

      <div
        class="search-results"
        id="search-results"
        hidden
      ></div>
    </div>

    <!-- 侧边栏导航 -->
    <nav
      class="sidebar-nav"
      aria-label="网站主要导航"
    >
      <a href="../index.html">
        <span>主页</span>
      </a>

      <!-- 当前页面的 active 放在这里 -->
      <a
        class="active"
        href="./index.html"
        aria-current="page"
      >
        <span>圣地列表</span>
      </a>

      <a href="../tips/index.html">
        <span>巡礼攻略</span>
      </a>

      <a href="../news/index.html">
        <span>石川相关</span>
      </a>

      <a href="../other/index.html">
        <span>其他</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <p>一起享受在莲之空的圣地巡礼吧！</p>
    </div>
  </aside>

  <!-- 页面主体 -->
  <main class="main-content detail-main">
    <a
      class="back-link"
      href="./index.html"
    >
      ← 返回金泽市圣地
    </a>

    <!-- JavaScript 在这里生成地点详情 -->
    <article
      class="place-detail"
      id="place-detail"
      aria-live="polite"
    >
      <p class="status-message">
        正在读取地点资料……
      </p>
    </article>

    <footer class="site-footer">
      <p>莲之空圣地部</p>
      <p>本网站为非官方粉丝整理项目。</p>
    </footer>
  </main>

  <!-- 图片放大查看 -->
  <div
    class="image-lightbox"
    id="image-lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="图片预览"
    hidden
  >
    <button
      class="lightbox-close"
      id="lightbox-close"
      type="button"
      aria-label="关闭图片预览"
    >
      ×
    </button>

    <div class="lightbox-content">
      <img
        id="lightbox-image"
        src=""
        alt=""
      >

      <p
        class="lightbox-caption"
        id="lightbox-caption"
      ></p>
    </div>
  </div>
</body>
</html>
