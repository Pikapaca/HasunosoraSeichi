<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>地点详情｜莲之空圣地部</title>

  <!-- 根目录公共样式 -->
  <link
    rel="stylesheet"
    href="../../../style.css"
  >

  <!-- 当前文件夹的详情页样式 -->
  <link
    rel="stylesheet"
    href="./detail.css"
  >

  <!-- 当前文件夹的详情页脚本 -->
  <script
    src="./detail.js"
    defer
  ></script>
</head>

<body>
  <main class="main-content detail-main">
    <a
      class="back-link"
      href="./index.html"
    >
      ← 返回金泽市圣地
    </a>

    <!-- JavaScript 在这里生成地点详情 -->
    <article
      class="place-detail"
      id="place-detail"
      aria-live="polite"
    >
      <p class="status-message">
        正在读取地点资料……
      </p>
    </article>

    <footer class="site-footer">
      <p>莲之空圣地部</p>
      <p>本网站为非官方粉丝整理项目。</p>
    </footer>
  </main>

  <!-- 图片放大查看 -->
  <div
    class="image-lightbox"
    id="image-lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="图片预览"
    hidden
  >
    <button
      class="lightbox-close"
      id="lightbox-close"
      type="button"
      aria-label="关闭图片预览"
    >
      ×
    </button>

    <div class="lightbox-content">
      <img
        id="lightbox-image"
        src=""
        alt=""
      >

      <p
        class="lightbox-caption"
        id="lightbox-caption"
      ></p>
    </div>
  </div>
</body>
</html>
